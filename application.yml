server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"

  server:
    password: "crystalmusic123"
    sources:
      youtube: false # Important: the plugin handles this
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

    # Using the short names that correctly map to OAuth-compatible clients
    clients:
      - TV           # Maps to TVHTML5 (OAuth compatible)
      - ANDROID_VR   # Maps to ANDROID_VR (OAuth compatible)
      - WEB          # For search and non-OAuth playback
      - WEB_REMIX    # For YouTube Music search

    oauth:
      enabled: true
      # Your existing refresh token
      refreshToken: "1//05WTnyBUg67K5CgYIARAAGAUSNwF-L9IrzPoCXRZRF0-d9tozyAZZw52hCchHSSTYhqgF0k3wEkrInoKo97sfCrUgiwjmpPOV3_c"

    # Some Railway environments work better without this line. 
    # If it still fails, try deleting the line below.
    cipherServerUrl: "https://yt-cipher.kikkia.dev"

logging:
  level:
    root: INFO
    lavalink: INFO
