server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"

  server:
    password: "crystalmusic123"
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

    # Using the most stable client combination
    clients:
      - MUSIC        # Standard YouTube Music client
      - TV           # OAuth compatible
      - ANDROID_VR   # OAuth compatible
      - MWEB         # Mobile Web client (often avoids "Login Required")
      - WEB          # Desktop fallback

    oauth:
      enabled: true
      refreshToken: "1//05WTnyBUg67K5CgYIARAAGAUSNwF-L9IrzPoCXRZRF0-d9tozyAZZw52hCchHSSTYhqgF0k3wEkrInoKo97sfCrUgiwjmpPOV3_c"

    # Re-enabled: This server helps decode the "sig function" when the local plugin fails
    cipherServerUrl: "https://yt-cipher.kikkia.dev"

logging:
  level:
    root: INFO
    lavalink: INFO
